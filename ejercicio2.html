<!DOCTYPE html>
<html lang="en">
<head>

    <title>Ejercicio 2</title>

<body>

    <div class="sticker-container">

        <div class="sticker-box">
            <img src="./assets/img/lulu.png" alt="lulu sticker">
            <input type="number" id="stickerTwo" min="0" value="0">
        </div>

        <div class="sticker-box">
            <img src="./assets/img/yasuo.png" alt="yasuo sticker">
            <input type="number" id="stickerThree" min="0" value="0">
        </div>
    </div>

    <button id="buyButton"> Comprar!</button>
    <p id="textoTotal"></p>

    <script src="./assets/script/ejercicio2.js"></script>
